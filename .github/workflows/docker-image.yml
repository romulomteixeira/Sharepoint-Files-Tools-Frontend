name: Docker Image CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  quality-and-tests:
    name: Code quality and type check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit and component tests
        run: npm test

      - name: Build
        run: npm run build

  end-to-end-tests:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

  dockerfile-lint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          license-check: true
          deny-licenses: GPL-3.0, AGPL-3.0

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan hardcoded secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      # Rulesets OSS p/ frontend: JS, TS, React e OWASP Top 10.
      # GATE em severidade ERROR (alto risco); WARNING/INFO só no painel Security.
      - name: Semgrep findings (texto, diagnóstico temporário)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten \
            --severity ERROR \
            --metrics off || true

      - name: Run Semgrep (SARIF, gate em ERROR)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten \
            --severity ERROR \
            --error \
            --sarif --output semgrep.sarif \
            --metrics off

      - name: Upload Semgrep SARIF
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sast-njsscan:
    name: SAST - njsscan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install njsscan
        run: python -m pip install --upgrade njsscan

      # GATE: --exit-warning faz qualquer finding reprovar o PR.
      - name: Run njsscan (SARIF, gate)
        run: njsscan --exit-warning --sarif --output njsscan.sarif src

      - name: Upload njsscan SARIF
        if: ${{ always() && hashFiles('njsscan.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: njsscan.sarif
          category: njsscan

  trivy-repository-scan:
    name: Dependency, secret and IaC scan - Trivy filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Trivy filesystem scan and generate SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy filesystem SARIF
        if: ${{ hashFiles('trivy-fs.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - name: Run Trivy filesystem scan (gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  build-and-scan-image:
    name: Build and scan Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality-and-tests
      - end-to-end-tests
      - dockerfile-lint
      - secrets-scan
      - sast-semgrep
      - sast-njsscan
      - trivy-repository-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate IMAGE_NAME variable
        run: |
          set -euo pipefail
          if [ -z "${IMAGE_NAME}" ]; then
            echo "Configure the repository variable IMAGE_NAME. Example: your-dockerhub-user/sharepoint-monitor-frontend"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          build-args: |
            ALPINE_SECURITY_REFRESH=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy image scan and generate SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: ${{ hashFiles('trivy-image.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif

      - name: Run Trivy image scan (gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  publish-image:
    name: Publish Docker image to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-scan-image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALPINE_SECURITY_REFRESH=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  scan-published-image:
    name: Scan published Docker image digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: publish-image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan published image digest with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.publish-image.outputs.image-digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
