apiVersion: v1
kind: Service
metadata:
  name: {{ include "fe.fullname" . }}
  labels:
    {{- include "fe.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "fe.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
---
# Service ExternalName "backend": faz o host "backend" (usado no nginx.conf da
# imagem: proxy_pass http://backend:8787) resolver para o gateway do backend.
# Assim a imagem do frontend funciona sem rebuild do nginx.conf.
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "fe.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ .Values.backend.gatewayServiceFQDN | quote }}
